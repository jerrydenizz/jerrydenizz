<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jerry Deniz | Tüm Linkler</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 680px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }
    p {
      margin: 0 0 24px;
      color: #d1d5db;
      line-height: 1.6;
    }
    a {
      display: block;
      text-decoration: none;
      color: white;
      margin: 12px 0;
      padding: 16px 18px;
      border-radius: 16px;
      font-weight: bold;
      transition: transform .2s ease, opacity .2s ease;
    }
    a:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }
    .yt { background: #dc2626; }
    .music { background: #4338ca; }
    .twitch { background: #7c3aed; }
    .discord { background: #4f46e5; }
    .insta { background: linear-gradient(45deg, #f97316, #ec4899); }
    .footer {
      margin-top: 22px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Jerry Deniz</h1>
    <p>Tüm sosyal medya ve topluluk linklerim tek sayfada.</p>

    <a class="yt" href="https://www.youtube.com/@jerrydenizz" target="_blank">🎮 YouTube Oyun Kanalı</a>
    <a class="music" href="https://www.youtube.com/@deniz_kopal" target="_blank">🎵 YouTube Müzik Kanalı</a>
    <a class="twitch" href="https://www.twitch.tv/jerrydenizz" target="_blank">🟣 Twitch</a>
    <a class="discord" href="https://discord.gg/w9F6dTfj" target="_blank">💬 Discord</a>
    <a class="insta" href="https://www.instagram.com/deniz_funda_kopal" target="_blank">📸 Instagram</a>

    <div class="footer">© 2026 Jerry Deniz</div>
  </div>
</body>
</html>
